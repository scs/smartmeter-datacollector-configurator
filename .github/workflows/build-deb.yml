name: Build Debian package

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-deb:
    strategy:
      matrix:
        runner: ["ubuntu-24.04", "ubuntu-24.04-arm"]
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: backend

    name: Build a Debian package for ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4
      - name: Update apt cache
        run: sudo apt-get update
      - name: Install Poetry
        run: pipx install poetry~=2.1.3
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.13
          cache: poetry
      - name: Setup project with Poetry
        run: | 
          python --version; python -m pip --version; poetry --version
          poetry install --no-interaction

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/smartmeter-datacollector-configurator/package-lock.json
      - name: Setup frontend project with npm
        working-directory: frontend/smartmeter-datacollector-configurator
        run: npm ci --ignore-scripts

      - name: Prepare to build a Debian package
        run: sudo apt-get -y install build-essential debhelper dh-make rename

      - name: Build a Debian package
        run: poetry run poe build_deb

      - name: Archive the built Debian package
        uses: actions/upload-artifact@v4
        with:
          name: smartmeter-datacollector-configurator-${{ matrix.arch }}-deb
          path: backend/deb_dist/*.deb
      - name: Archive the additional Debian package files
        uses: actions/upload-artifact@v4
        with:
          name: smartmeter-datacollector-configurator-${{ matrix.arch }}-packagefiles
          path: |
            backend/deb_dist/*.buildinfo
            backend/deb_dist/*.changes
            backend/deb_dist/*.tar.*

      - name: Get the tag name
        id: tagName
        if: startsWith(github.ref, 'refs/tags')
        uses: olegtarasov/get-tag@v2.1.4

      - name: Create a new release
        if: startsWith(github.ref, 'refs/tags')
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts:  backend/deb_dist/*.deb
          draft: true
          name: Smart Meter Data Collector Configurator ${{ steps.tagName.outputs.tag }}
          omitBody: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}
