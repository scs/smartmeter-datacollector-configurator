name: Publish Python package to PyPI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend

    name: Build Python package, publish to (Test-)PyPI
    steps:
      - uses: actions/checkout@v4
      - name: Install Poetry
        run: pipx install poetry~=2.1.3
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.9
          cache: poetry
      - name: Setup project with Poetry
        run: |
          python --version; python -m pip --version; poetry --version
          poetry install --no-interaction

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: npm
          cache-dependency-path: frontend/smartmeter-datacollector-configurator/package-lock.json
      - name: Setup frontend project with npm
        working-directory: frontend/smartmeter-datacollector-configurator
        run: |
          npm ci --ignore-scripts

      - name: Build a Python package
        run: |
          bash scripts/build_py.sh

      - name: Archive the built Python package
        uses: actions/upload-artifact@v4
        with:
          name: smartmeter-datacollector-configurator-py
          path: backend/dist/*

      - name: Publish the Python package to Test PyPI
        if: github.ref == 'refs/heads/master' || github.event_name == 'pull_request'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository-url: https://test.pypi.org/legacy/
          packages-dir: backend/dist/
          verify-metadata: true
          skip_existing: true

      - name: Publish the Python package to PyPI
        if: startsWith(github.ref, 'refs/tags')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: backend/dist/

      - name: Get the tag name
        id: tagName
        if: startsWith(github.ref, 'refs/tags')
        uses: olegtarasov/get-tag@v2.1.4

      - name: Create a new release
        if: startsWith(github.ref, 'refs/tags')
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: backend/dist/*.tar.gz,backend/dist/*.whl
          draft: true
          name: Smart Meter Data Collector Configurator ${{ steps.tagName.outputs.tag }}
          omitBody: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}
